name: Task
description: A standalone task or small improvement.
title: "chore: <subject>"
labels: [task]
body:
  - type: textarea
    id: what
    attributes:
      label: What
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: Why now? What does it unblock or improve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Verifiable conditions for done, as a checklist.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional context, links.
    validations:
      required: false
